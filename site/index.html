<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMP API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid #d1d5db;
        background: #fff;
      }
      .brand {
        font-weight: 700;
        font-size: 14px;
      }
      nav a {
        color: #374151;
        text-decoration: none;
        margin-left: 12px;
        font-size: 13px;
      }
      nav a:hover {
        color: #111827;
      }
      #api-container {
        margin: 0;
      }
      #swagger-ui .topbar {
        display: none;
      }
      #swagger-ui {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">AMP API Docs (v1)</div>
      <nav>
        <a href="./index.html">API Reference</a>
        <a href="./quickstart.md">Quickstart</a>
        <a href="./changelog.md">Changelog</a>
      </nav>
    </header>

    <div id="api-container"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      const mount = document.getElementById("api-container");
      const ui = document.createElement("div");
      ui.id = "swagger-ui";
      mount.appendChild(ui);
      SwaggerUIBundle({
        url: "./openapi/v1.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        displayRequestDuration: false,
        defaultModelsExpandDepth: 0,
        docExpansion: "list",
      });
    </script>
  </body>
</html>
