name: docs-site

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static site files
        run: |
          test -f openapi/v1.yaml || (echo "Missing openapi/v1.yaml" && exit 1)
          test -f site/index.html || (echo "Missing site/index.html" && exit 1)
          test -f site/quickstart.md || (echo "Missing site/quickstart.md" && exit 1)
          test -f site/changelog.md || (echo "Missing site/changelog.md" && exit 1)

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare publish dir
        run: |
          mkdir -p _site/openapi _site
          cp -R site/* _site/
          cp openapi/v1.yaml _site/openapi/v1.yaml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
